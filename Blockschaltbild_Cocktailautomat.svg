<svg xmlns="http://www.w3.org/2000/svg" width="2800" height="1780" viewBox="0 0 2800 1780" role="img" aria-labelledby="title desc">
  <title id="title">Blockschaltbild des Cocktailautomaten</title>
  <desc id="desc">Blockschaltbild mit Benutzer, Weboberfläche, GitHub-Rezepten, MQTT, ESP32, Bedienung, Sensorik, Aktorik und Spannungsversorgung.</desc>
  <defs>
    <style>
      .bg { fill: #f4f7fb; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 3; rx: 24; ry: 24; }
      .panel-blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; rx: 24; ry: 24; }
      .panel-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 24; ry: 24; }
      .panel-orange { fill: #ffedd5; stroke: #ea580c; stroke-width: 3; rx: 24; ry: 24; }
      .panel-purple { fill: #f3e8ff; stroke: #9333ea; stroke-width: 3; rx: 24; ry: 24; }
      .panel-yellow { fill: #fef9c3; stroke: #ca8a04; stroke-width: 3; rx: 24; ry: 24; }
      .title { font: 700 52px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 24px Arial, Helvetica, sans-serif; fill: #334155; }
      .section { font: 700 32px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .text { font: 400 24px Arial, Helvetica, sans-serif; fill: #1e293b; }
      .small { font: 400 19px Arial, Helvetica, sans-serif; fill: #334155; }
      .label { font: 400 18px Arial, Helvetica, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 5; fill: none; marker-end: url(#arrowhead); }
      .arrow-power { stroke: #dc2626; stroke-width: 5; fill: none; marker-end: url(#arrowhead-red); }
      .dashed { stroke-dasharray: 14 10; }
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#475569" />
    </marker>
    <marker id="arrowhead-red" markerWidth="14" markerHeight="10" refX="10" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#dc2626" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="2800" height="1780"/>

  <text class="title" x="1300" y="90" text-anchor="middle">Blockschaltbild des Cocktailautomaten</text>
  <text class="subtitle" x="1300" y="132" text-anchor="middle">Übersicht über Bedienung, Kommunikation, Steuerung, Sensorik, Aktorik und Spannungsversorgung</text>

  <rect class="panel-blue" x="80" y="210" width="500" height="190"/>
  <text class="section" x="120" y="270">Benutzer</text>
  <text class="text" x="120" y="325">• bedient Gerät lokal</text>
  <text class="text" x="120" y="365">• oder über Browser</text>

  <rect class="panel-purple" x="760" y="210" width="600" height="240"/>
  <text class="section" x="800" y="270">Weboberfläche im Browser</text>
  <text class="text" x="800" y="325">• Anzeige von Statusdaten</text>
  <text class="text" x="800" y="365">• Starten von Rezepten und Funktionen</text>
  <text class="small" x="800" y="405">data/index.html, data/app.js,</text>
  <text class="small" x="800" y="435">data/style.css</text>

  <rect class="panel" x="1620" y="210" width="430" height="190"/>
  <text class="section" x="1660" y="270">GitHub</text>
  <text class="text" x="1660" y="325">• Online-Rezepte</text>
  <text class="small" x="1660" y="365">recipes.json</text>

  <rect class="panel-green" x="1100" y="520" width="520" height="250"/>
  <text class="section" x="1140" y="580">MQTT / WLAN</text>
  <text class="text" x="1140" y="635">• WebSocket zum Browser</text>
  <text class="text" x="1140" y="675">• Befehle + Statusdaten</text>
  <text class="small" x="1140" y="720">Kommunikationspfad zwischen</text>
  <text class="small" x="1140" y="748">Browser und ESP32</text>

  <rect class="panel-orange" x="860" y="880" width="920" height="310"/>
  <text class="section" x="900" y="940">ESP32-S3 Firmware</text>
  <text class="text" x="900" y="995">• Menülogik, Rezepte, Dosierung, Reinigung</text>
  <text class="text" x="900" y="1035">• verarbeitet Encoder, Tasten, Waage und MQTT-Befehle</text>
  <text class="text" x="900" y="1075">• steuert LCD, Relais, Motor und Statusmeldungen</text>
  <text class="small" x="900" y="1125">src/main.cpp + LittleFS-Webserver</text>

  <rect class="panel" x="80" y="560" width="650" height="280"/>
  <text class="section" x="120" y="620">Lokale Bedienung</text>
  <text class="text" x="120" y="675">• Rotary-Encoder</text>
  <text class="text" x="120" y="715">• Encoder-Taste / Back-Taste</text>
  <text class="text" x="120" y="755">• 4x20 LCD als lokale Anzeige</text>

  <rect class="panel-yellow" x="80" y="1020" width="650" height="250"/>
  <text class="section" x="120" y="1080">Sensorik</text>
  <text class="text" x="120" y="1135">• HX711 + Wägezelle(n)</text>
  <text class="text" x="120" y="1175">• Glaserkennung / Gewicht</text>
  <text class="small" x="120" y="1218">liefert Ist-Wert für Dosierung</text>
  <text class="small" x="120" y="1246">und Abbruchbedingungen</text>

  <rect class="panel-blue" x="2070" y="560" width="620" height="280"/>
  <text class="section" x="2110" y="620">Aktorik</text>
  <text class="text" x="2110" y="675">• TB6600 Motortreiber</text>
  <text class="text" x="2110" y="715">• Peristaltikpumpe / Schrittmotor</text>
  <text class="text" x="2110" y="755">• 10 Relais für Ventile und Luftpfad</text>

  <rect class="panel-purple" x="2070" y="980" width="620" height="300"/>
  <text class="section" x="2110" y="1040">Flüssigkeitspfad</text>
  <text class="text" x="2110" y="1095">• 9 Flüssigkeitsleitungen / Slots</text>
  <text class="text" x="2110" y="1135">• Luftventil zum Nachfördern</text>
  <text class="text" x="2110" y="1175">• Glas im Ausgabebereich</text>
  <text class="small" x="2110" y="1220">wird durch Pumpe und</text>
  <text class="small" x="2110" y="1248">Ventile bedient</text>

  <rect class="panel-orange" x="760" y="1400" width="1280" height="260"/>
  <text class="section" x="800" y="1460">Spannungsversorgung</text>
  <text class="text" x="800" y="1515">• 230V AC → Schaltnetzteil → 24V DC / 12V DC / 5V DC</text>
  <text class="text" x="800" y="1555">• versorgt ESP32, Motortreiber, Relais, Sensorik und Anzeige</text>
  <text class="small" x="800" y="1600">Leistungspfad getrennt von Steuer- und Datenpfaden dargestellt</text>

  <line class="arrow" x1="580" y1="305" x2="760" y2="305"/>
  <line class="arrow" x1="350" y1="400" x2="350" y2="560"/>
  <line class="arrow" x1="1360" y1="450" x2="1360" y2="520"/>
  <line class="arrow dashed" x1="1620" y1="305" x2="1360" y2="305"/>
  <line class="arrow" x1="1360" y1="770" x2="1360" y2="880"/>
  <path class="arrow" d="M730 700 L800 700 L800 980 L860 1030"/>
  <line class="arrow" x1="730" y1="1130" x2="860" y2="1130"/>
  <path class="arrow" d="M1780 1030 L1940 1030 L1940 760 L2070 700"/>
  <line class="arrow" x1="1780" y1="1110" x2="2070" y2="1110"/>
  <line class="arrow-power" x1="1100" y1="1400" x2="430" y2="840"/>
  <line class="arrow-power" x1="1360" y1="1400" x2="1360" y2="1190"/>
  <line class="arrow-power" x1="1520" y1="1400" x2="1520" y2="1190"/>
  <line class="arrow-power" x1="1760" y1="1400" x2="2310" y2="840"/>

  <text class="label" x="610" y="292">Benutzer nutzt Browser</text>
  <text class="label" x="372" y="515">Benutzer bedient Gerät</text>
  <text class="label" x="1390" y="500">Kommunikation</text>
  <text class="label" x="1460" y="292">Online-Rezepte laden</text>
  <text class="label" x="810" y="935">Bedien- und Sensordaten</text>
  <text class="label" x="1865" y="1005">Steuersignale</text>
  <text class="label" x="1850" y="1095">fördert / schaltet</text>
  <text class="label" x="930" y="1368" fill="#dc2626">Versorgung</text>

  <rect class="panel" x="2200" y="1400" width="500" height="260"/>
  <text class="section" x="2240" y="1460">Legende</text>
  <line class="arrow" x1="2240" y1="1515" x2="2350" y2="1515"/>
  <text class="small" x="2380" y="1525">Daten- / Steuersignal</text>
  <line class="arrow dashed" x1="2240" y1="1575" x2="2350" y2="1575"/>
  <text class="small" x="2380" y="1585">externe Datenquelle</text>
  <line class="arrow-power" x1="2240" y1="1635" x2="2350" y2="1635"/>
  <text class="small" x="2380" y="1645">Spannungsversorgung</text>
</svg>
